name: 株スクリーニング

on:
  schedule:
    - cron: '0 7 * * 1-5'  # UTC 7:00 = JST 16:00（平日のみ）
  workflow_dispatch: {}

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: スクリーニング実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        # 使用する戦略は config.py の ACTIVE_STRATEGY で切り替える
        run: python main.py
